# This workflow will build a Java project with Gradle, upload the artifacts to the action/release, and publish them to platforms
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Platform Publish
on:
  workflow_call:
    inputs:
      name:
        type: string
        required: false
        default: ""
        description: "The name of the artifact when it's done building and uploaded"
      java:
        type: string
        required: false
        default: 21
        description: The Java version that should be used to build the project
      path:
        type: string
        required: false
        default: "build/libs/*.jar"
        description: The path to the built files to be uploaded as artifacts
      task:
        type: string
        required: false
        default: build publishMods
        description: The task to run to build the project
    secrets:
      MODRINTH_TOKEN:
        required: false
        description: Modrinth token (if platform-publishing)
      CURSEFORGE_TOKEN:
        required: false
        description: CurseForge token (if platform-publishing)

permissions:
  contents: write

jobs:
  build:
    name: Build (and Platform publish)
    runs-on: ubuntu-latest
    if: "github.ref_type == 'tag' || !contains(github.event.commits[0].message, '[no-build]')"
    outputs:
      artifact-name: ${{ steps.context.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
          
      - name: Build context
        id: context
        shell: bash
        run: |
          echo "artifact-name=${{ inputs.name || github.event.repository.name }}" >> "$GITHUB_OUTPUT"
      
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java }}
      
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build and publish jar
        run: ./gradlew ${{ inputs.task }}
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          
      - name: Upload to action
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: ${{ steps.context.outputs.artifact-name }}
          path: ${{ inputs.path }}
          
  publish:
    name: Publish (GitHub release)
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success' && github.ref_type == 'tag'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: ./artifacts

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          files: ./artifacts/*
