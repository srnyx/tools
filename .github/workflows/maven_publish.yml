# This workflow will build a Java project with Gradle, upload the artifacts to the action/release, and publish them to Maven
# For more information see:
#   - https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle
#   - https://reposilite.com/guide/github

name: Maven Publish
on:
  workflow_call:
    inputs:
      channel:
        type: string
        required: true
        description: "The release channel to publish to (ex: snapshots)"
      maven_url:
        type: string
        required: false
        default: "https://repo.srnyx.com"
        description: "The URL of the repository to publish to (NO trailing /)"
      name:
        type: string
        required: false
        default: ""
        description: "The name of the artifact when it's done building and uploaded"
      java:
        type: string
        required: false
        default: 21
        description: The Java version that should be used to build the project
      path:
        type: string
        required: false
        default: ""
        description: The path to the built files to be uploaded as artifacts
      build_tool:
        type: string
        required: false
        default: auto
        description: auto, gradle, or maven
      task:
        type: string
        required: false
        default: __default__
        description: The task to run to build and publish the project
      pterodactyl-panel:
        type: string
        required: false
        default: "https://panel.venox.network"
        description: The host URL of the Pterodactyl panel (required for Pterodactyl upload)
      pterodactyl-server:
        type: string
        required: false
        default: ""
        description: The ID of the Pterodactyl server (required for Pterodactyl upload)
      pterodactyl-target:
        type: string
        required: false
        default: "./update/Application.jar"
        description: Destination of the file on the Pterodactyl server. Can be a file name (for a single source) or a directory name ending with a slash (for multiple files).
      pterodactyl-restart:
        type: boolean
        required: false
        default: false
        description: If you want to restart the Pterodactyl server after successful Pterodactyl upload
    secrets:
      MAVEN_NAME:
        required: true
        description: Maven username (if maven-publishing)
      MAVEN_SECRET:
        required: true
        description: Maven secret (password) (if maven-publishing)
      MODRINTH_TOKEN:
        required: false
        description: Modrinth token (if platform-publishing)
      CURSEFORGE_TOKEN:
        required: false
        description: CurseForge token (if platform-publishing)
      GRADLE_PUBLISH_KEY:
        required: false
        description: Gradle publish key (if publishing to Gradle plugin portal)
      GRADLE_PUBLISH_SECRET:
        required: false
        description: Gradle publish secret (if publishing to Gradle plugin portal)
      PTERODACTYL_TOKEN:
        required: false
        description: The API key for the Pterodactyl panel (required for Pterodactyl upload)

permissions:
  contents: write

jobs:
  build:
    name: Build (and Maven publish)
    runs-on: ubuntu-latest
    if: "github.ref_type == 'tag' || !contains(github.event.commits[0].message, '[no-build]')"
    outputs:
      artifact-name: ${{ steps.context.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      # Also update build.yml if changed!
      - name: Build context
        id: context
        shell: bash
        run: |
          # Build tool
          tool=""
          if [[ "${{ inputs.build_tool }}" != "auto" ]]; then
            tool="${{ inputs.build_tool }}"
          elif [[ -f "gradlew" ]]; then
            tool="gradle"
          elif [[ -f "pom.xml" ]]; then
            tool="maven"
          elif [[ -f "build.sbt" ]]; then
            tool="sbt"
          fi
          if [[ "$tool" != "gradle" && "$tool" != "maven" && "$tool" != "sbt" ]]; then
            echo "No supported build tool found!"
            exit 1
          fi
          echo "tool=$tool" >> "$GITHUB_OUTPUT"
      
          # Cache type (only valid ones)
          if [[ "$tool" == "gradle" || "$tool" == "maven" || "$tool" == "sbt" ]]; then
            echo "cache=$tool" >> "$GITHUB_OUTPUT"
          else
            echo "cache=" >> "$GITHUB_OUTPUT"
          fi
      
          # Command
          if [[ "$tool" == "gradle" ]]; then
            base="./gradlew"
          elif [[ "$tool" == "maven" ]]; then
            base="mvn"
          elif [[ "$tool" == "sbt" ]]; then
            base="sbt"
          fi
          if [[ "${{ inputs.task }}" != "__default__" ]]; then
            arguments="${{ inputs.task }}"
          elif [[ "$tool" == "gradle" ]]; then
            arguments="build publish"
          elif [[ "$tool" == "maven" ]]; then
            arguments="clean deploy"
          elif [[ "$tool" == "sbt" ]]; then
            arguments="publish"
          fi
          echo "command=$base $arguments" >> "$GITHUB_OUTPUT"
      
          # Artifact path
          if [[ -n "${{ inputs.path }}" ]]; then
            echo "path=${{ inputs.path }}" >> "$GITHUB_OUTPUT"
          elif [[ "$tool" == "gradle" ]]; then
            echo "path=build/libs/*.jar" >> "$GITHUB_OUTPUT"
          elif [[ "$tool" == "maven" || "$tool" == "sbt" ]]; then
            echo "path=target/*.jar" >> "$GITHUB_OUTPUT"
          fi
          
          # Artifact name (shared between upload in build job and download in publish job)
          echo "artifact-name=${{ inputs.name || github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          
      - uses: gradle/actions/wrapper-validation@v6
        if: steps.context.outputs.tool == 'gradle'
        
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java }}
          cache: ${{ steps.context.outputs.cache }}
          
      - name: Grant execute permission for gradlew
        if: steps.context.outputs.tool == 'gradle'
        run: chmod +x gradlew
        
      - name: Build and publish jar
        run: ${{ steps.context.outputs.command }}
        env:
          MAVEN_URL: ${{ inputs.maven_url }}/${{ inputs.channel }}
          MAVEN_NAME: ${{ secrets.MAVEN_NAME }}
          MAVEN_SECRET: ${{ secrets.MAVEN_SECRET }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          
      - name: Upload to action
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.context.outputs.artifact-name }}
          path: ${{ steps.context.outputs.path }}
          
  publish:
    name: Publish (GitHub release + Pterodactyl)
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success' && (github.ref_type == 'tag' || (secrets.PTERODACTYL_TOKEN && inputs['pterodactyl-server']))
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: ./artifacts

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          files: ./artifacts/*
      
      - name: Upload to Pterodactyl server
        uses: rexlmanu/pterodactyl-upload-action@v2.4
        if: ${{ env.PTERODACTYL_TOKEN && inputs['pterodactyl-server'] }}
        with:
          api-key: ${{ env.PTERODACTYL_TOKEN }}
          panel-host: ${{ inputs['pterodactyl-panel'] }}
          server-id: ${{ inputs['pterodactyl-server'] }}
          source: ./artifacts/*
          target: ${{ inputs['pterodactyl-target'] }}
          restart: ${{ inputs['pterodactyl-restart'] }}
        env:
          PTERODACTYL_TOKEN: ${{ secrets.PTERODACTYL_TOKEN }}
